<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2N1 - Đơn Giản</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
        }
        
        .logo i {
            color: gold;
        }
        
        .points {
            background: gold;
            color: #333;
            padding: 10px 20px;
            border-radius: 30px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.9);
            color: #333;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .card h2 {
            margin-bottom: 15px;
            color: #4b6cb7;
        }
        
        .task-item {
            background: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
        
        .pet-display {
            font-size: 60px;
            text-align: center;
        }
        
        .pet-stats {
            margin: 20px 0;
        }
        
        .stat-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin: 5px 0;
        }
        
        .stat-fill {
            height: 100%;
            background: #4b6cb7;
            border-radius: 5px;
            width: 50%;
        }
        
        button {
            padding: 10px 20px;
            background: #4b6cb7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background: #182848;
        }
        
        .food-count {
            font-size: 24px;
            color: #ff6b6b;
            margin: 10px 0;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-clock"></i> 2N1
            </div>
            <div class="points">
                <i class="fas fa-star"></i> <span id="points">0</span>
            </div>
        </div>
        
        <div class="grid">
            <!-- Cột trái: Nhiệm vụ -->
            <div>
                <div class="card">
                    <h2><i class="fas fa-tasks"></i> Nhiệm vụ hôm nay</h2>
                    <div id="tasks"></div>
                    <button onclick="addTask()"><i class="fas fa-plus"></i> Thêm nhiệm vụ</button>
                </div>
                
                <div class="card">
                    <h2><i class="fas fa-calendar"></i> Tiến độ</h2>
                    <div id="progress">0/0 nhiệm vụ</div>
                    <div class="stat-bar">
                        <div class="stat-fill" id="progress-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <!-- Cột phải: Thú cưng -->
            <div>
                <div class="card">
                    <h2><i class="fas fa-paw"></i> Thú cưng</h2>
                    
                    <div class="pet-display" id="pet-emoji">🐱</div>
                    
                    <div class="pet-stats">
                        <div>Hạnh phúc: <span id="happiness">50%</span></div>
                        <div class="stat-bar">
                            <div class="stat-fill" id="happiness-bar" style="width: 50%"></div>
                        </div>
                        
                        <div>Đói: <span id="hunger">100%</span></div>
                        <div class="stat-bar">
                            <div class="stat-fill" id="hunger-bar" style="width: 100%"></div>
                        </div>
                        
                        <div>Cấp độ: <span id="level">1</span></div>
                    </div>
                    
                    <div class="food-count">
                        <i class="fas fa-drumstick-bite"></i> Thức ăn: <span id="food">3</span>
                    </div>
                    
                    <div>
                        <button onclick="feedPet()"><i class="fas fa-apple-alt"></i> Cho ăn</button>
                        <button onclick="playPet()"><i class="fas fa-gamepad"></i> Chơi</button>
                    </div>
                    
                    <p id="pet-message" style="margin-top: 10px; color: #666;"></p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Dữ liệu mẫu
        let points = 50;
        let food = 3;
        let petStats = {
            happiness: 50,
            hunger: 100,
            level: 1
        };
        let tasks = [
            { id: 1, name: 'Học ReactJS', duration: 30, completed: false },
            { id: 2, name: 'Làm bài tập', duration: 45, completed: false }
        ];
        
        // Cập nhật hiển thị
        function updateDisplay() {
            document.getElementById('points').textContent = points;
            document.getElementById('food').textContent = food;
            document.getElementById('happiness').textContent = petStats.happiness + '%';
            document.getElementById('hunger').textContent = petStats.hunger + '%';
            document.getElementById('level').textContent = petStats.level;
            document.getElementById('happiness-bar').style.width = petStats.happiness + '%';
            document.getElementById('hunger-bar').style.width = petStats.hunger + '%';
            
            // Hiển thị tasks
            let tasksHtml = '';
            tasks.forEach(task => {
                tasksHtml += `
                    <div class="task-item">
                        <span>
                            <input type="checkbox" onchange="completeTask(${task.id})" ${task.completed ? 'checked' : ''}>
                            ${task.name} (${task.duration}p)
                        </span>
                        <span>⭐ ${Math.floor(task.duration/5)}</span>
                    </div>
                `;
            });
            document.getElementById('tasks').innerHTML = tasksHtml || 'Chưa có nhiệm vụ';
            
            // Cập nhật tiến độ
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('progress').textContent = `${completed}/${tasks.length} nhiệm vụ`;
            const percent = tasks.length ? (completed/tasks.length)*100 : 0;
            document.getElementById('progress-bar').style.width = percent + '%';
            
            // Message
            if (petStats.hunger < 30) {
                document.getElementById('pet-message').innerHTML = '⚠️ Thú cưng đang đói!';
            } else if (petStats.happiness < 30) {
                document.getElementById('pet-message').innerHTML = '😢 Thú cưng đang buồn!';
            } else {
                document.getElementById('pet-message').innerHTML = '😊 Thú cưng đang vui!';
            }
        }
        
        // Thêm nhiệm vụ
        function addTask() {
            const name = prompt('Tên nhiệm vụ:');
            if (!name) return;
            const duration = prompt('Thời gian (phút):', '30');
            tasks.push({
                id: Date.now(),
                name: name,
                duration: parseInt(duration) || 30,
                completed: false
            });
            updateDisplay();
        }
        
        // Hoàn thành nhiệm vụ
        function completeTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task && !task.completed) {
                task.completed = true;
                points += Math.floor(task.duration/5);
                food += 1; // Mỗi nhiệm vụ được 1 thức ăn
                
                // Pet nhận exp
                if (Math.random() > 0.7) { // 30% cơ hội lên cấp
                    petStats.level++;
                }
                
                updateDisplay();
                alert(`✅ Nhận ${Math.floor(task.duration/5)} điểm và 1 thức ăn!`);
            }
        }
        
        // Cho pet ăn
        function feedPet() {
            if (food <= 0) {
                alert('❌ Hết thức ăn! Làm nhiệm vụ để nhận thức ăn.');
                return;
            }
            
            food--;
            petStats.hunger = Math.min(100, petStats.hunger + 30);
            petStats.happiness += 5;
            updateDisplay();
            alert('🍖 Đã cho thú cưng ăn!');
        }
        
        // Chơi với pet
        function playPet() {
            if (petStats.hunger < 20) {
                alert('❌ Thú cưng đói quá! Hãy cho ăn trước.');
                return;
            }
            
            petStats.happiness = Math.min(100, petStats.happiness + 20);
            petStats.hunger -= 10;
            updateDisplay();
            alert('🎮 Đã chơi với thú cưng!');
        }
        
        // Khởi tạo
        updateDisplay();
        
        // Giảm đói mỗi phút
        setInterval(() => {
            petStats.hunger = Math.max(0, petStats.hunger - 5);
            petStats.happiness = Math.max(0, petStats.happiness - 2);
            updateDisplay();
        }, 60000);
    </script>
</body>
</html>
